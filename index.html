<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>אביה עיצובים בעץ - יומן פגישות</title>
  <style>
    :root {
      --bg:        #F5EDE0;
      --card:      #FFF8F0;
      --primary:   #7C4A1E;
      --primary-h: #5C3410;
      --gold:      #C4956A;
      --gold-h:    #A87A52;
      --text:      #3D2B1F;
      --muted:     #9C7A5A;
      --border:    #E8D5BE;
      --hover-bg:  #F0E0CC;
      --row-alt:   #FBF3EA;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: var(--bg); color: var(--text); direction: rtl;
    }

    /* ── LOGIN ─────────────────────────────────────── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: linear-gradient(145deg, #4A2810 0%, #8B5030 50%, #C4956A 100%);
    }
    .login-box {
      background: var(--card); padding: 44px 38px; border-radius: 20px;
      box-shadow: 0 28px 70px rgba(60,30,10,.35); text-align: center; width: 300px;
      border: 1px solid var(--border);
    }
    .login-logo { font-size: 2.4rem; margin-bottom: 10px; }
    .login-box h1 { font-size: 1.35rem; color: var(--primary); margin-bottom: 4px; font-weight: 700; }
    .login-box p  { color: var(--muted); font-size: .88rem; margin-bottom: 26px; }
    .login-box input {
      width: 100%; padding: 11px 14px; border: 2px solid var(--border); border-radius: 10px;
      font-size: 1rem; text-align: center; direction: ltr; margin-bottom: 12px;
      background: white; transition: border-color .2s; color: var(--text);
    }
    .login-box input:focus { outline: none; border-color: var(--gold); }
    .login-box button {
      width: 100%; padding: 12px; background: var(--primary); color: #FFF8F0;
      border: none; border-radius: 10px; font-size: 1rem; cursor: pointer;
      font-weight: 600; letter-spacing: .03em; transition: background .2s;
    }
    .login-box button:hover { background: var(--primary-h); }
    .login-error { color: #c0392b; font-size: .83rem; margin-top: 10px; display: none; }

    /* ── APP SHELL ─────────────────────────────────── */
    #app { display: none; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── HEADER ────────────────────────────────────── */
    .app-header {
      background: var(--card); padding: 10px 18px;
      box-shadow: 0 2px 10px rgba(60,30,10,.12);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap; z-index: 20; position: relative;
    }
    .header-brand {
      font-size: 1.05rem; font-weight: 700; color: var(--primary);
      white-space: nowrap; letter-spacing: .04em;
      position: absolute; left: 0; right: 0;
      text-align: center; pointer-events: none;
    }
    .date-nav { display: flex; align-items: center; gap: 8px; flex: 1; }
    .date-nav button {
      background: var(--hover-bg); border: 1px solid var(--border); border-radius: 8px;
      width: 34px; height: 34px; font-size: 1rem; cursor: pointer; color: var(--primary);
      display: flex; align-items: center; justify-content: center; transition: background .15s;
    }
    .date-nav button:hover { background: var(--border); }
    #date-display {
      font-size: 1.05rem; font-weight: 700; min-width: 210px;
      text-align: center; color: var(--text);
    }
    .btn-today {
      background: var(--primary); color: #FFF8F0; border: none; border-radius: 8px;
      padding: 6px 14px; font-size: .83rem; font-weight: 600; cursor: pointer;
      transition: background .2s; white-space: nowrap;
    }
    .btn-today:hover { background: var(--primary-h); }

    /* View toggle */
    .view-toggle {
      display: flex; background: var(--hover-bg); border-radius: 9px;
      padding: 3px; gap: 2px; border: 1px solid var(--border);
    }
    .view-toggle button {
      background: none; border: none; border-radius: 7px;
      padding: 5px 13px; font-size: .83rem; cursor: pointer;
      color: var(--muted); transition: all .15s; white-space: nowrap; font-family: inherit;
    }
    .view-toggle button.active {
      background: var(--card); color: var(--primary);
      font-weight: 700; box-shadow: 0 1px 4px rgba(60,30,10,.15);
    }

    .filter-wrap { display: flex; align-items: center; gap: 6px; }
    .filter-wrap label { font-size: .82rem; color: var(--muted); }
    .filter-wrap select {
      padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px;
      font-size: .88rem; cursor: pointer; background: var(--card); color: var(--text);
    }
    .btn-icon {
      background: var(--hover-bg); border: 1px solid var(--border); border-radius: 8px;
      width: 34px; height: 34px; font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: background .15s;
    }
    .btn-icon:hover { background: var(--border); }
    .btn-logout {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      padding: 5px 11px; font-size: .8rem; color: var(--muted);
      cursor: pointer; transition: all .2s;
    }
    .btn-logout:hover { border-color: #c0392b; color: #c0392b; }

    /* ── CALENDAR BODY ─────────────────────────────── */
    .calendar-body { display: flex; flex: 1; overflow: hidden; }
    .time-gutter {
      width: 52px; flex-shrink: 0; background: var(--row-alt);
      border-left: 1px solid var(--border); overflow: hidden; padding-top: 44px;
    }
    .time-label {
      height: 60px; display: flex; align-items: flex-start; justify-content: center;
      font-size: .72rem; color: var(--muted); padding-top: 4px; border-top: 1px solid var(--border);
    }

    /* ── DAY VIEW GRID ─────────────────────────────── */
    .designers-grid { display: flex; flex: 1; overflow-x: auto; overflow-y: auto; }
    .designer-col { flex: 1; min-width: 155px; border-left: 1px solid var(--border); display: flex; flex-direction: column; background: var(--bg); }

    /* ── WEEK VIEW GRID ────────────────────────────── */
    .week-grid { display: flex; flex: 1; overflow-x: auto; overflow-y: auto; }
    .week-col { flex: 1; min-width: 110px; border-left: 1px solid var(--border); display: flex; flex-direction: column; background: var(--bg); }

    /* shared column header */
    .col-header {
      height: 44px; flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: var(--card); border-bottom: 2px solid var(--border);
      position: sticky; top: 0; z-index: 10;
      font-size: .8rem; color: var(--muted); gap: 1px;
    }
    .col-header.today-col { border-bottom-color: var(--gold); background: #FFF3E6; }
    .col-header .col-day-name { font-size: .75rem; }
    .col-header .col-date-num {
      font-size: 1rem; font-weight: 700; color: var(--text);
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
    }
    .col-header.today-col .col-date-num { background: var(--gold); color: white; }

    /* designer column header (day view) */
    .designer-header {
      height: 44px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .93rem; background: var(--card);
      border-bottom: 3px solid; position: sticky; top: 0; z-index: 10;
    }

    .col-slots { position: relative; flex: 1; }
    .slot-line { position: absolute; width: 100%; pointer-events: none; }
    .slot-line.hour { border-top: 1px solid var(--border); }
    .slot-line.half { border-top: 1px dashed #EDD9C0; }
    .slot-click { position: absolute; width: 100%; height: 30px; cursor: pointer; transition: background .1s; }
    .slot-click:hover { background: rgba(196,149,106,.1); }

    /* ── APPOINTMENTS ──────────────────────────────── */
    .appointment {
      position: absolute; right: 3px; left: 20%;
      border-radius: 7px; padding: 4px 7px; font-size: .76rem;
      cursor: pointer; overflow: hidden; color: white;
      box-shadow: 0 2px 6px rgba(60,30,10,.25);
      transition: transform .1s, box-shadow .1s; z-index: 5;
    }
    .appointment:hover { transform: scale(1.025); box-shadow: 0 4px 12px rgba(60,30,10,.3); }
    .apt-time   { font-size: .67rem; opacity: .88; }
    .apt-client { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .apt-designer { font-size: .67rem; opacity: .82; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .apt-notes  { font-size: .67rem; opacity: .77; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── MODALS ────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(40,20,5,.5); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card); border-radius: 18px; padding: 28px;
      width: 380px; max-width: 94vw; border: 1px solid var(--border);
      box-shadow: 0 28px 64px rgba(60,30,10,.28); animation: pop .18s ease;
    }
    @keyframes pop { from { transform: scale(.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .modal-header h3 { font-size: 1.05rem; color: var(--primary); font-weight: 700; }
    .btn-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--muted); line-height: 1; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: .82rem; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%; padding: 9px 11px; border: 1.5px solid var(--border); border-radius: 9px;
      font-size: .93rem; font-family: inherit; direction: rtl;
      background: white; color: var(--text); transition: border-color .2s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { outline: none; border-color: var(--gold); }
    .form-group textarea { resize: vertical; min-height: 68px; }
    .time-row { display: flex; gap: 10px; }
    .time-row .form-group { flex: 1; }
    .modal-actions { display: flex; gap: 8px; margin-top: 18px; }
    .btn-save {
      flex: 1; padding: 10px; background: var(--primary); color: #FFF8F0;
      border: none; border-radius: 9px; font-size: .95rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background .2s;
    }
    .btn-save:hover { background: var(--primary-h); }
    .btn-delete {
      padding: 10px 15px; background: #fdf0ee; color: #c0392b;
      border: 1px solid #f5c6c0; border-radius: 9px; font-size: .95rem;
      cursor: pointer; font-family: inherit; transition: background .2s;
    }
    .btn-delete:hover { background: #fad9d5; }

    /* ── SETTINGS MODAL ────────────────────────────── */
    .settings-modal { width: 440px; }
    .settings-modal h3 { color: var(--primary) !important; }
    .designer-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .designer-row:last-of-type { border-bottom: none; }
    .designer-row input[type="text"] {
      flex: 1; padding: 8px 10px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: .93rem; font-family: inherit; direction: rtl;
      background: white; color: var(--text);
    }
    .designer-row input[type="text"]:focus { outline: none; border-color: var(--gold); }
    .color-dot {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid var(--border); cursor: pointer; flex-shrink: 0; transition: transform .15s;
    }
    .color-dot:hover { transform: scale(1.15); }
    .color-picker-hidden { display: none; }
    .btn-remove-designer {
      background: none; border: none; color: var(--border);
      font-size: 1.3rem; cursor: pointer; padding: 0 4px;
      transition: color .15s; flex-shrink: 0; line-height: 1;
    }
    .btn-remove-designer:hover { color: #c0392b; }
    .btn-add-designer {
      display: flex; align-items: center; gap: 6px;
      background: none; border: 2px dashed var(--border); border-radius: 9px;
      padding: 8px 14px; width: 100%; margin-top: 12px;
      font-size: .88rem; color: var(--muted); cursor: pointer;
      transition: all .2s; font-family: inherit;
    }
    .btn-add-designer:hover { border-color: var(--gold); color: var(--gold); }
    .settings-note { font-size: .78rem; color: var(--muted); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }

    /* ── MOBILE ────────────────────────────────────── */
    @media (max-width: 600px) {
      .header-brand { font-size: .85rem; }
      #date-display { font-size: .88rem; min-width: 140px; }
      .designer-col, .week-col { min-width: 110px; }
      .filter-wrap label { display: none; }
      .settings-modal { width: 95vw; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ──────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">📅</div>
    <h1>אביה עיצובים בעץ</h1>
    <p>יומן פגישות</p>
    <input type="password" id="pwd-input" placeholder="סיסמה" autocomplete="current-password">
    <button id="login-btn">כניסה</button>
    <div class="login-error" id="login-error">סיסמה שגויה, נסה שוב</div>
  </div>
</div>

<!-- ── MAIN APP ────────────────────────────────────── -->
<div id="app">
  <div class="app-header">
    <span class="header-brand">אביה עיצובים בעץ</span>
    <div class="date-nav">
      <button id="btn-prev">&#8594;</button>
      <span id="date-display"></span>
      <button id="btn-next">&#8592;</button>
    </div>
    <button class="btn-today" id="btn-today">היום</button>
    <div class="view-toggle">
      <button id="vt-day" class="active">יומי</button>
      <button id="vt-week">שבועי</button>
    </div>
    <div class="filter-wrap">
      <label>סינון:</label>
      <select id="designer-filter"></select>
    </div>
    <button class="btn-icon" id="btn-settings" title="הגדרות">⚙️</button>
    <button class="btn-logout" id="btn-logout">יציאה</button>
  </div>

  <div class="calendar-body">
    <div class="time-gutter" id="time-gutter"></div>
    <div class="designers-grid" id="designers-grid"></div>
    <div class="week-grid" id="week-grid" style="display:none"></div>
  </div>
</div>

<!-- ── APPOINTMENT MODAL ──────────────────────────── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">פגישה חדשה</h3>
      <button class="btn-close" id="modal-close">×</button>
    </div>
    <div class="form-group">
      <label>מעצבת</label>
      <select id="f-designer"></select>
    </div>
    <div class="form-group">
      <label>שם לקוח / פרויקט</label>
      <input type="text" id="f-client" placeholder="שם הלקוח">
    </div>
    <div class="form-group">
      <label>טלפון לקוח</label>
      <input type="tel" id="f-phone" placeholder="05X-XXXXXXX" dir="ltr" style="text-align:right">
    </div>
    <div class="time-row">
      <div class="form-group">
        <label>שעת התחלה</label>
        <input type="time" id="f-start" value="09:00">
      </div>
      <div class="form-group">
        <label>שעת סיום</label>
        <input type="time" id="f-end" value="10:00">
      </div>
    </div>
    <div class="form-group">
      <label>הערות</label>
      <textarea id="f-notes" placeholder="כתובת, טלפון, פרטים נוספים..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-save" id="btn-save">שמירה</button>
      <button class="btn-delete" id="btn-delete" style="display:none">מחיקה</button>
    </div>
  </div>
</div>

<!-- ── ADMIN PASSWORD MODAL ───────────────────────── -->
<div class="modal-overlay" id="admin-pwd-overlay">
  <div class="modal" style="width:300px;text-align:center">
    <div class="modal-header" style="justify-content:center;border-bottom:none;margin-bottom:8px">
      <h3>🔒 סיסמת מנהל</h3>
    </div>
    <div class="form-group" style="margin-bottom:12px">
      <input type="password" id="admin-pwd-input" placeholder="הכנס סיסמה" style="text-align:center;direction:ltr">
    </div>
    <div class="login-error" id="admin-pwd-error" style="margin-bottom:10px">סיסמה שגויה</div>
    <div class="modal-actions">
      <button class="btn-save" id="admin-pwd-confirm">כניסה</button>
      <button class="btn-delete" id="admin-pwd-cancel">ביטול</button>
    </div>
  </div>
</div>

<!-- ── SETTINGS MODAL ─────────────────────────────── -->
<div class="modal-overlay" id="settings-overlay">
  <div class="modal settings-modal">
    <div class="modal-header">
      <h3>⚙️ ניהול יומנים</h3>
      <button class="btn-close" id="settings-close">×</button>
    </div>
    <div id="designers-list"></div>
    <button class="btn-add-designer" id="btn-add-designer">＋ הוספת יומן</button>
    <p class="settings-note">לחץ על העיגול הצבעוני לשינוי צבע</p>
    <div class="modal-actions">
      <button class="btn-save" id="settings-save">שמירה</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }       from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAuth, signInAnonymously, signOut, onAuthStateChanged }
                                from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
import { getFirestore, collection, doc, query, where,
         onSnapshot, addDoc, updateDoc, deleteDoc, setDoc, getDoc }
                                from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

/* ═══════════════════════════════════════════════════
   ⚙️  שנה כאן רק את הסיסמה
   ═══════════════════════════════════════════════════ */
const APP_PASSWORD   = "1234";   // ← סיסמת כניסה לאפליקציה
const ADMIN_PASSWORD = "1234";   // ← סיסמת כניסה להגדרות

const DEFAULT_DESIGNERS = [
  { id: "1", name: "מעצבת 1", color: "#8B4513" },
  { id: "2", name: "מעצבת 2", color: "#C4956A" },
  { id: "3", name: "מעצבת 3", color: "#6B8E5A" },
];

const START_HOUR = 8;
const END_HOUR   = 20;
const HOUR_PX    = 60;
/* ═══════════════════════════════════════════════════ */

const firebaseConfig = {
  apiKey:            "AIzaSyAUtcuAcjrpeOjWZb6LDmRuPgWqV7TeUaE",
  authDomain:        "calendar-next1.firebaseapp.com",
  projectId:         "calendar-next1",
  storageBucket:     "calendar-next1.firebasestorage.app",
  messagingSenderId: "976426874332",
  appId:             "1:976426874332:web:df1815e70274f14f6a0b19",
};

const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);

/* ─── State ─────────────────────────────────────── */
let DESIGNERS     = [];
let currentDate   = today();
let activeFilter  = "all";
let viewMode      = "day";   // "day" | "week"
let editingId     = null;
let modalDateStr  = "";      // YYYY-MM-DD for the appointment being created/edited
let unsubscribe   = null;
let lastApts      = [];

const DAYS_HE    = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
const DAYS_SHORT = ["א׳","ב׳","ג׳","ד׳","ה׳","ו׳","ש׳"];
const MONTHS_HE  = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];

function today() { const d = new Date(); d.setHours(0,0,0,0); return d; }

/* ─── Auth ───────────────────────────────────────── */
document.getElementById("login-btn").addEventListener("click", doLogin);
document.getElementById("pwd-input").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
document.getElementById("btn-logout").addEventListener("click", () => { if (unsubscribe) unsubscribe(); signOut(auth); });

function doLogin() {
  const val = document.getElementById("pwd-input").value;
  const err = document.getElementById("login-error");
  if (val === APP_PASSWORD) {
    err.style.display = "none";
    signInAnonymously(auth).catch(() => {
      err.textContent = "שגיאת חיבור. בדוק שהאימות האנונימי הופעל ב-Firebase.";
      err.style.display = "block";
    });
  } else {
    err.style.display = "block";
    document.getElementById("pwd-input").value = "";
    document.getElementById("pwd-input").focus();
  }
}

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "flex";
    initApp();
  } else {
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("app").style.display = "none";
    document.getElementById("pwd-input").value = "";
  }
});

/* ─── Init ───────────────────────────────────────── */
async function initApp() {
  await loadDesigners();
  buildTimeGutter();
  buildFilterSelect();
  buildModalDesigners();
  renderDateDisplay();
  rebuildAndSubscribe();
  bindEvents();
}

function bindEvents() {
  document.getElementById("btn-prev").addEventListener("click", () => navigate(-1));
  document.getElementById("btn-next").addEventListener("click", () => navigate(1));
  document.getElementById("btn-today").addEventListener("click", () => {
    currentDate = today(); renderDateDisplay(); rebuildAndSubscribe();
  });
  document.getElementById("designer-filter").addEventListener("change", e => {
    activeFilter = e.target.value;
    if (viewMode === "day") { buildDayGrid(); renderApts(lastApts); }
    else                    { buildWeekGrid(); renderWeekApts(lastApts); }
  });
  // View toggle
  document.getElementById("vt-day").addEventListener("click", () => setView("day"));
  document.getElementById("vt-week").addEventListener("click", () => setView("week"));
  // Appointment modal
  document.getElementById("modal-close").addEventListener("click", closeModal);
  document.getElementById("modal-overlay").addEventListener("click", e => {
    if (e.target === document.getElementById("modal-overlay")) closeModal();
  });
  document.getElementById("btn-save").addEventListener("click", saveApt);
  document.getElementById("btn-delete").addEventListener("click", deleteApt);
  // Admin password modal
  document.getElementById("btn-settings").addEventListener("click", openAdminPrompt);
  document.getElementById("admin-pwd-confirm").addEventListener("click", confirmAdminPwd);
  document.getElementById("admin-pwd-cancel").addEventListener("click", closeAdminPrompt);
  document.getElementById("admin-pwd-input").addEventListener("keydown", e => { if (e.key === "Enter") confirmAdminPwd(); });
  // Settings modal
  document.getElementById("settings-close").addEventListener("click", closeSettings);
  document.getElementById("settings-overlay").addEventListener("click", e => {
    if (e.target === document.getElementById("settings-overlay")) closeSettings();
  });
  document.getElementById("settings-save").addEventListener("click", saveSettings);
  document.getElementById("btn-add-designer").addEventListener("click", addDesignerRow);
}

/* ─── View switching ─────────────────────────────── */
function setView(mode) {
  viewMode = mode;
  document.getElementById("vt-day").classList.toggle("active", mode === "day");
  document.getElementById("vt-week").classList.toggle("active", mode === "week");
  document.getElementById("designers-grid").style.display = mode === "day"  ? "" : "none";
  document.getElementById("week-grid").style.display      = mode === "week" ? "" : "none";
  renderDateDisplay();
  rebuildAndSubscribe();
}

function rebuildAndSubscribe() {
  if (viewMode === "day") { buildDayGrid(); subscribeDay(); }
  else                    { buildWeekGrid(); subscribeWeek(); }
}

/* ─── Navigation ─────────────────────────────────── */
function navigate(delta) {
  currentDate = new Date(currentDate);
  currentDate.setDate(currentDate.getDate() + (viewMode === "week" ? delta * 7 : delta));
  renderDateDisplay();
  rebuildAndSubscribe();
}

function renderDateDisplay() {
  const el = document.getElementById("date-display");
  if (viewMode === "day") {
    const d = currentDate;
    el.textContent = `יום ${DAYS_HE[d.getDay()]}, ${d.getDate()} ב${MONTHS_HE[d.getMonth()]} ${d.getFullYear()}`;
  } else {
    const days = weekDays();
    const s = days[0], e = days[5];
    if (s.getMonth() === e.getMonth()) {
      el.textContent = `${s.getDate()} – ${e.getDate()} ב${MONTHS_HE[s.getMonth()]} ${s.getFullYear()}`;
    } else {
      el.textContent = `${s.getDate()} ב${MONTHS_HE[s.getMonth()]} – ${e.getDate()} ב${MONTHS_HE[e.getMonth()]}`;
    }
  }
}

/* ─── Week helpers ───────────────────────────────── */
function weekStart(d = currentDate) {
  const s = new Date(d);
  s.setDate(s.getDate() - s.getDay()); // Sunday
  s.setHours(0,0,0,0);
  return s;
}
function weekDays(d = currentDate) {
  const s = weekStart(d);
  return Array.from({length: 6}, (_, i) => {
    const day = new Date(s); day.setDate(s.getDate() + i); return day;
  });
}

/* ─── Date key ───────────────────────────────────── */
function dateKey(d = currentDate) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function todayKey() { return dateKey(today()); }

/* ─── Designers (Firestore) ─────────────────────── */
async function loadDesigners() {
  const ref = doc(db, "settings", "designers");
  const snap = await getDoc(ref);
  if (snap.exists()) DESIGNERS = snap.data().list;
  else { DESIGNERS = DEFAULT_DESIGNERS; await setDoc(ref, { list: DESIGNERS }); }
}

/* ─── Time gutter ────────────────────────────────── */
function buildTimeGutter() {
  const g = document.getElementById("time-gutter");
  g.innerHTML = "";
  for (let h = START_HOUR; h <= END_HOUR; h++) {
    const el = document.createElement("div");
    el.className = "time-label";
    el.textContent = `${String(h).padStart(2,"0")}:00`;
    g.appendChild(el);
  }
}

/* ─── Slot scaffold (reused by both views) ────────── */
function buildSlots(container, onClickSlot) {
  container.style.height = `${(END_HOUR - START_HOUR) * HOUR_PX}px`;
  for (let h = START_HOUR; h < END_HOUR; h++) {
    const offset = (h - START_HOUR) * HOUR_PX;
    const ln = document.createElement("div"); ln.className = "slot-line hour"; ln.style.top = `${offset}px`;
    const lh = document.createElement("div"); lh.className = "slot-line half"; lh.style.top = `${offset + HOUR_PX/2}px`;
    container.appendChild(ln); container.appendChild(lh);
  }
  for (let h = START_HOUR; h < END_HOUR; h++) {
    for (let half = 0; half < 2; half++) {
      const zone = document.createElement("div");
      zone.className = "slot-click";
      zone.style.top = `${((h - START_HOUR) * 60 + half * 30) / 60 * HOUR_PX}px`;
      const t = `${String(h).padStart(2,"0")}:${half === 0 ? "00" : "30"}`;
      zone.addEventListener("click", () => onClickSlot(t));
      container.appendChild(zone);
    }
  }
}

/* ─── Day view ───────────────────────────────────── */
function buildDayGrid() {
  const grid = document.getElementById("designers-grid");
  grid.innerHTML = "";
  const visible = visibleDesigners();
  visible.forEach(d => {
    const col = document.createElement("div");
    col.className = "designer-col"; col.dataset.id = d.id;
    const hdr = document.createElement("div");
    hdr.className = "designer-header"; hdr.textContent = d.name;
    hdr.style.borderColor = d.color; hdr.style.color = d.color;
    col.appendChild(hdr);
    const slots = document.createElement("div"); slots.className = "col-slots";
    buildSlots(slots, t => openNew(d.id, t, dateKey()));
    col.appendChild(slots); grid.appendChild(col);
  });
}

function subscribeDay() {
  if (unsubscribe) unsubscribe();
  const q = query(collection(db, "appointments"), where("date", "==", dateKey()));
  unsubscribe = onSnapshot(q, snap => {
    lastApts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderApts(lastApts);
  });
}

function renderApts(apts) {
  document.querySelectorAll("#designers-grid .appointment").forEach(el => el.remove());
  const ids = visibleDesigners().map(d => d.id);
  apts.filter(a => ids.includes(a.designerId)).forEach(apt => {
    const slots = document.querySelector(`#designers-grid .designer-col[data-id="${apt.designerId}"] .col-slots`);
    if (!slots) return;
    const designer = DESIGNERS.find(d => d.id === apt.designerId);
    if (!designer) return;
    placeAppointment(slots, apt, designer.color, false);
  });
}

/* ─── Week view ──────────────────────────────────── */
function buildWeekGrid() {
  const grid = document.getElementById("week-grid");
  grid.innerHTML = "";
  const tk = todayKey();
  weekDays().forEach(day => {
    const dk = dateKey(day);
    const col = document.createElement("div");
    col.className = "week-col"; col.dataset.date = dk;

    const hdr = document.createElement("div");
    hdr.className = "col-header" + (dk === tk ? " today-col" : "");
    hdr.innerHTML = `<span class="col-day-name">${DAYS_SHORT[day.getDay()]}</span>
                     <span class="col-date-num">${day.getDate()}</span>`;
    col.appendChild(hdr);

    const slots = document.createElement("div"); slots.className = "col-slots";
    buildSlots(slots, t => openNew(DESIGNERS[0]?.id || "", t, dk));
    col.appendChild(slots); grid.appendChild(col);
  });
}

function subscribeWeek() {
  if (unsubscribe) unsubscribe();
  const dateKeys = weekDays().map(d => dateKey(d));
  const q = query(collection(db, "appointments"), where("date", "in", dateKeys));
  unsubscribe = onSnapshot(q, snap => {
    lastApts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderWeekApts(lastApts);
  }, err => console.error("week query error:", err));
}

function renderWeekApts(apts) {
  document.querySelectorAll("#week-grid .appointment").forEach(el => el.remove());
  const filterIds = activeFilter === "all" ? DESIGNERS.map(d => d.id) : [activeFilter];
  apts.filter(a => filterIds.includes(a.designerId)).forEach(apt => {
    const slots = document.querySelector(`#week-grid .week-col[data-date="${apt.date}"] .col-slots`);
    if (!slots) return;
    const designer = DESIGNERS.find(d => d.id === apt.designerId);
    if (!designer) return;
    placeAppointment(slots, apt, designer.color, true);
  });
}

/* ─── Shared appointment renderer ────────────────── */
function placeAppointment(container, apt, color, showDesigner) {
  const s = toMins(apt.startTime) - START_HOUR * 60;
  const e = toMins(apt.endTime)   - START_HOUR * 60;
  const top    = (s / 60) * HOUR_PX;
  const height = Math.max(((e - s) / 60) * HOUR_PX, 24);

  const el = document.createElement("div");
  el.className = "appointment";
  el.style.top = `${top}px`; el.style.height = `${height}px`; el.style.background = color;
  const designer = DESIGNERS.find(d => d.color === color);
  el.innerHTML = `
    <div class="apt-time">${apt.startTime} – ${apt.endTime}</div>
    <div class="apt-client">${apt.clientName || ""}</div>
    ${showDesigner && designer ? `<div class="apt-designer">${designer.name}</div>` : ""}
    ${apt.notes ? `<div class="apt-notes">${apt.notes}</div>` : ""}
  `;
  el.addEventListener("click", ev => { ev.stopPropagation(); openEdit(apt); });
  container.appendChild(el);
}

function toMins(t) { const [h, m] = t.split(":").map(Number); return h * 60 + m; }
function visibleDesigners() {
  return activeFilter === "all" ? DESIGNERS : DESIGNERS.filter(d => d.id === activeFilter);
}

/* ─── Filter & modal designers ──────────────────── */
function buildFilterSelect() {
  const sel = document.getElementById("designer-filter");
  const prev = sel.value;
  sel.innerHTML = '<option value="all">יומנים</option>';
  DESIGNERS.forEach(d => {
    const o = document.createElement("option"); o.value = d.id; o.textContent = d.name; sel.appendChild(o);
  });
  if ([...sel.options].some(o => o.value === prev)) sel.value = prev;
}
function buildModalDesigners() {
  const sel = document.getElementById("f-designer");
  const prev = sel.value;
  sel.innerHTML = "";
  DESIGNERS.forEach(d => {
    const o = document.createElement("option"); o.value = d.id; o.textContent = d.name; sel.appendChild(o);
  });
  if ([...sel.options].some(o => o.value === prev)) sel.value = prev;
}

/* ─── Appointment modal ──────────────────────────── */
function openNew(designerId, startTime, dateStr) {
  editingId    = null;
  modalDateStr = dateStr;
  document.getElementById("modal-title").textContent = "פגישה חדשה";
  document.getElementById("f-designer").value = designerId;
  document.getElementById("f-client").value   = "";
  document.getElementById("f-phone").value    = "";
  document.getElementById("f-start").value    = startTime;
  const [h, m] = startTime.split(":").map(Number);
  document.getElementById("f-end").value = `${String(Math.min(h+1,END_HOUR)).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
  document.getElementById("f-notes").value = "";
  document.getElementById("btn-delete").style.display = "none";
  document.getElementById("modal-overlay").classList.add("open");
  setTimeout(() => document.getElementById("f-client").focus(), 80);
}

function openEdit(apt) {
  editingId    = apt.id;
  modalDateStr = apt.date;
  document.getElementById("modal-title").textContent = "עריכת פגישה";
  document.getElementById("f-designer").value = apt.designerId;
  document.getElementById("f-client").value   = apt.clientName || "";
  document.getElementById("f-phone").value    = apt.phone || "";
  document.getElementById("f-start").value    = apt.startTime;
  document.getElementById("f-end").value      = apt.endTime;
  document.getElementById("f-notes").value    = apt.notes || "";
  document.getElementById("btn-delete").style.display = "block";
  document.getElementById("modal-overlay").classList.add("open");
}

function closeModal() { document.getElementById("modal-overlay").classList.remove("open"); editingId = null; }

async function saveApt() {
  const client = document.getElementById("f-client").value.trim();
  if (!client) { document.getElementById("f-client").focus(); return; }
  const data = {
    date:       modalDateStr || dateKey(),
    designerId: document.getElementById("f-designer").value,
    clientName: client,
    phone:      document.getElementById("f-phone").value.trim(),
    startTime:  document.getElementById("f-start").value,
    endTime:    document.getElementById("f-end").value,
    notes:      document.getElementById("f-notes").value.trim(),
  };
  try {
    if (editingId) await updateDoc(doc(db, "appointments", editingId), data);
    else           await addDoc(collection(db, "appointments"), data);
    closeModal();
  } catch (err) { alert("שגיאה בשמירה."); console.error(err); }
}

async function deleteApt() {
  if (!editingId || !confirm("למחוק את הפגישה?")) return;
  try { await deleteDoc(doc(db, "appointments", editingId)); closeModal(); }
  catch (err) { alert("שגיאה במחיקה."); console.error(err); }
}

/* ─── Admin password prompt ──────────────────────── */
function openAdminPrompt() {
  document.getElementById("admin-pwd-input").value = "";
  document.getElementById("admin-pwd-error").style.display = "none";
  document.getElementById("admin-pwd-overlay").classList.add("open");
  setTimeout(() => document.getElementById("admin-pwd-input").focus(), 80);
}
function closeAdminPrompt() {
  document.getElementById("admin-pwd-overlay").classList.remove("open");
}
function confirmAdminPwd() {
  const val = document.getElementById("admin-pwd-input").value;
  if (val === ADMIN_PASSWORD) {
    closeAdminPrompt();
    openSettings();
  } else {
    document.getElementById("admin-pwd-error").style.display = "block";
    document.getElementById("admin-pwd-input").value = "";
    document.getElementById("admin-pwd-input").focus();
  }
}

/* ─── Settings modal ─────────────────────────────── */
const PRESET_COLORS = ["#8B4513","#C4956A","#6B8E5A","#A0522D","#CD853F","#8B7355","#C0622A","#7D9B6B"];

function openSettings()  { renderDesignersList(); document.getElementById("settings-overlay").classList.add("open"); }
function closeSettings() { document.getElementById("settings-overlay").classList.remove("open"); }

function renderDesignersList() {
  const list = document.getElementById("designers-list");
  list.innerHTML = "";
  const draft = DESIGNERS.map(d => ({ ...d }));
  list.dataset.draft = JSON.stringify(draft);
  draft.forEach((d, i) => appendDesignerRow(list, d, i));
}

function appendDesignerRow(list, d, i) {
  const row = document.createElement("div"); row.className = "designer-row"; row.dataset.index = i;
  const colorBtn   = document.createElement("div"); colorBtn.className = "color-dot"; colorBtn.style.background = d.color; colorBtn.title = "שנה צבע";
  const colorInput = document.createElement("input"); colorInput.type = "color"; colorInput.className = "color-picker-hidden"; colorInput.value = d.color;
  colorInput.addEventListener("input", e => { colorBtn.style.background = e.target.value; updateDraft(list, i, "color", e.target.value); });
  colorBtn.addEventListener("click", () => colorInput.click());
  const nameInput = document.createElement("input"); nameInput.type = "text"; nameInput.value = d.name; nameInput.placeholder = "שם מעצבת";
  nameInput.addEventListener("input", e => updateDraft(list, i, "name", e.target.value));
  const removeBtn = document.createElement("button"); removeBtn.className = "btn-remove-designer"; removeBtn.innerHTML = "×";
  removeBtn.addEventListener("click", () => {
    let draft = JSON.parse(list.dataset.draft); draft.splice(i, 1);
    list.dataset.draft = JSON.stringify(draft); list.innerHTML = "";
    draft.forEach((dd, ii) => appendDesignerRow(list, dd, ii));
  });
  row.appendChild(colorBtn); row.appendChild(colorInput); row.appendChild(nameInput); row.appendChild(removeBtn);
  list.appendChild(row);
}

function updateDraft(list, i, key, value) {
  const draft = JSON.parse(list.dataset.draft); draft[i][key] = value; list.dataset.draft = JSON.stringify(draft);
}

function addDesignerRow() {
  const list  = document.getElementById("designers-list");
  const draft = JSON.parse(list.dataset.draft);
  const newD  = { id: String(Date.now()), name: "", color: PRESET_COLORS[draft.length % PRESET_COLORS.length] };
  draft.push(newD); list.dataset.draft = JSON.stringify(draft);
  appendDesignerRow(list, newD, draft.length - 1);
  setTimeout(() => list.lastElementChild?.querySelector("input[type=text]")?.focus(), 50);
}

async function saveSettings() {
  const list  = document.getElementById("designers-list");
  const draft = JSON.parse(list.dataset.draft).filter(d => d.name.trim() !== "");
  if (draft.length === 0) { alert("יש להגדיר לפחות מעצבת אחת."); return; }
  try {
    await setDoc(doc(db, "settings", "designers"), { list: draft });
    DESIGNERS = draft; activeFilter = "all";
    document.getElementById("designer-filter").value = "all";
    buildFilterSelect(); buildModalDesigners();
    if (viewMode === "day") { buildDayGrid(); renderApts(lastApts); }
    else                    { buildWeekGrid(); renderWeekApts(lastApts); }
    closeSettings();
  } catch (err) { alert("שגיאה בשמירה."); console.error(err); }
}
</script>
